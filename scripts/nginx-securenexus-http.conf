# HTTP — expose SecureNexus via public IP (nginx reverse proxy)
#
# Typical layout:
#   Browser → http://PUBLIC_IP (nginx :80) → http://APP_PRIVATE_IP:3005 (PM2 / Next.js)
#
# Replace:
#   PUBLIC_IP        → nginx server public IP (e.g. 13.201.60.211)
#   APP_PRIVATE_IP   → app server private IP (e.g. 10.1.14.230), or 127.0.0.1 if same host
#
# Install:
#   sudo apt install -y nginx
#   sudo cp scripts/nginx-securenexus-http.conf /etc/nginx/sites-available/securenexus
#   sudo sed -i 's/PUBLIC_IP/13.201.60.211/g; s/APP_PRIVATE_IP/10.1.14.230/g' /etc/nginx/sites-available/securenexus
#   sudo ln -sf /etc/nginx/sites-available/securenexus /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Security Group (nginx host): inbound TCP 80
# .env on app server: NEXT_PUBLIC_APP_URL=http://13.201.60.211

server {
    listen 80;
    listen [::]:80;
    server_name PUBLIC_IP;

    client_max_body_size 50M;

    location / {
        proxy_pass http://APP_PRIVATE_IP:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
