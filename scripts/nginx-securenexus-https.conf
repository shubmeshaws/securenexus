# HTTPS — SecureNexus behind nginx with TLS
#
# Requires a domain name pointing to PUBLIC_IP (Let's Encrypt does not issue certs for bare IPs).
# Replace:
#   YOUR_DOMAIN      → e.g. securenexus.example.com
#   APP_PRIVATE_IP   → app server IP (e.g. 10.1.14.230), or 127.0.0.1 if same host
#
# 1. Point DNS A record: YOUR_DOMAIN → PUBLIC_IP
# 2. Use nginx-securenexus-http.conf first (certbot needs port 80)
# 3. sudo apt install -y certbot python3-certbot-nginx
# 4. sudo certbot --nginx -d YOUR_DOMAIN
#    (certbot updates this file with ssl_certificate paths)
#
# Or copy this template after manual cert placement:
#   /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
#   /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
#
# Security Group (nginx host): inbound TCP 80 and 443
# .env on app server: NEXT_PUBLIC_APP_URL=https://YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://APP_PRIVATE_IP:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
