services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: securenexus
    volumes:
      - securenexus_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securenexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file:
      - .env
    environment:
      # Override host for in-compose Postgres (not localhost)
      DATABASE_URL: postgresql://postgres:postgres_secure_pass@db:5432/securenexus?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  securenexus_pgdata:
